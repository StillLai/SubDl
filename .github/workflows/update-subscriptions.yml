name: Update Subscriptions

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - run: pip install requests brotli
        
    - run: npm install jsdom
        
    - name: Update subscriptions
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
        GIST_ID: ${{ secrets.GIST_ID }}
        USER_AGENT: ${{ secrets.USER_AGENT || 'clash-verge/v2.4.4' }}
        ENABLE_SINGBOX_CONVERT: ${{ secrets.ENABLE_SINGBOX_CONVERT || 'true' }}
        SUB_URL: ${{ secrets.SUB_URL }}
        SUB_URL_1: ${{ secrets.SUB_URL_1 }}
        SUB_URL_2: ${{ secrets.SUB_URL_2 }}
        SUB_URL_3: ${{ secrets.SUB_URL_3 }}
        SUB_URL_4: ${{ secrets.SUB_URL_4 }}
        SUB_URL_5: ${{ secrets.SUB_URL_5 }}
      run: python src/update_subscriptions.py
      
    - name: Commit README
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add README.md
        git diff --quiet && git diff --staged --quiet || git commit -m "Update subscription info [skip ci]"
        git push