name: Update Subscriptions

on:
  schedule:
    # 每 6 小时运行一次
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # 支持手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install requests
        
    - name: Update subscriptions
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
        GIST_ID: ${{ secrets.GIST_ID }}
        USER_AGENT: ${{ secrets.USER_AGENT || 'clash-verge/v2.4.4' }}
        SUB_URL: ${{ secrets.SUB_URL }}
        SUB_URL_1: ${{ secrets.SUB_URL_1 }}
        SUB_URL_2: ${{ secrets.SUB_URL_2 }}
        SUB_URL_3: ${{ secrets.SUB_URL_3 }}
        SUB_URL_4: ${{ secrets.SUB_URL_4 }}
        SUB_URL_5: ${{ secrets.SUB_URL_5 }}
      run: |
        python src/update_subscriptions.py
